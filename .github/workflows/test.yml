# Lance la suite de tests unitaires (node --test) à chaque push / PR.
# ELECTRON_SKIP_BINARY_DOWNLOAD : les tests n'ont pas besoin du binaire
# Electron (ils ne testent que la logique pure de src/) — on évite de
# télécharger ~100 Mo à chaque run.
name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - run: npm test
